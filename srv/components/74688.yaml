# 74688 — 8-bit equality comparator
# Source: Nexperia, "74HC688; 8-bit magnitude comparator", product data
# sheet Rev. 5 — 5 August 2025.
# https://assets.nexperia.com/documents/data-sheet/74HC688.pdf
# Pin numbering: datasheet DIP20 pinout — A (P) operand on even pins 2..18,
# B (Q) operand on odd pins 3..17, /E on 1, /Y (P=Q) on 19.
id: "type-74688"
type: "74688"
outline: [8, 19]

description: "8-bit equality comparator"
datasheet:
  vendor: Nexperia
  title: "74HC688; 8-bit magnitude comparator"
  rev: "Rev. 5, 5 August 2025"
  url: "https://assets.nexperia.com/documents/data-sheet/74HC688.pdf"

physical: # exporter-only package metadata (FR-062e); not read by editor or sim
  package: DIP-20
  pincount: 20
  power:
    - { name: VCC, number: 20 }
    - { name: GND, number: 10 }

pins:
  - { name: A0,  side: left,  pos: 2,  dir: bidir, number: 2,  desc: "port A bit 0" }
  - { name: A1,  side: left,  pos: 3,  dir: bidir, number: 4,  desc: "port A bit 1" }
  - { name: A2,  side: left,  pos: 4,  dir: bidir, number: 6,  desc: "port A bit 2" }
  - { name: A3,  side: left,  pos: 5,  dir: bidir, number: 8,  desc: "port A bit 3" }
  - { name: A4,  side: left,  pos: 6,  dir: bidir, number: 12, desc: "port A bit 4" }
  - { name: A5,  side: left,  pos: 7,  dir: bidir, number: 14, desc: "port A bit 5" }
  - { name: A6,  side: left,  pos: 8,  dir: bidir, number: 16, desc: "port A bit 6" }
  - { name: A7,  side: left,  pos: 9,  dir: bidir, number: 18, desc: "port A bit 7" }

  - { name: B0,  side: left,  pos: 11, dir: bidir, number: 3,  desc: "port B bit 0" }
  - { name: B1,  side: left,  pos: 12, dir: bidir, number: 5,  desc: "port B bit 1" }
  - { name: B2,  side: left,  pos: 13, dir: bidir, number: 7,  desc: "port B bit 2" }
  - { name: B3,  side: left,  pos: 14, dir: bidir, number: 9,  desc: "port B bit 3" }
  - { name: B4,  side: left,  pos: 15, dir: bidir, number: 11, desc: "port B bit 4" }
  - { name: B5,  side: left,  pos: 16, dir: bidir, number: 13, desc: "port B bit 5" }
  - { name: B6,  side: left,  pos: 17, dir: bidir, number: 15, desc: "port B bit 6" }
  - { name: B7,  side: left,  pos: 18, dir: bidir, number: 17, desc: "port B bit 7" }

  - { name: /E,  side: top,   pos: 4,  dir: in,    number: 1,  desc: "active-low inhibit"         }
  - { name: /Y,  side: right, pos: 2,  dir: out,   number: 19, desc: "active-low equality output" }

groups:
  - { name: A, pins: [A0, A1, A2, A3, A4, A5, A6, A7] }
  - { name: B, pins: [B0, B1, B2, B3, B4, B5, B6, B7] }

delays: # ns, 74HC typical at Vcc=4.5V, 25C
  tpd: 20

behavior: |
  ; 74688 — 8-bit equality comparator:
  ;   /E=H: /Y=H
  ;   A=B:  /Y=L
  ;   A!=B: /Y=H
  
  Y = E + A0 * /B0 + /A0 * B0 + A1 * /B1 + /A1 * B1 + A2 * /B2 + /A2 * B2
        + A3 * /B3 + /A3 * B3 + A4 * /B4 + /A4 * B4 + A5 * /B5 + /A5 * B5
        + A6 * /B6 + /A6 * B6 + A7 * /B7 + /A7 * B7
