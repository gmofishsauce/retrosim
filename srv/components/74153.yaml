# 74153 — dual 4-to-1 multiplexer
# The select lines A,B are common to both units on the real chip; here each mux
# symbol shows its own select inputs (tie them together when wiring). The
# active-low strobe/enable inputs are omitted from this rendering sample.
type: "74153"
rendertype: subunit
numunits: 2
renderas: mux4

pins:
  - { name: 1C0, side: left,  unit: A, dir: in }
  - { name: 1C1, side: left,  unit: A, dir: in }
  - { name: 1C2, side: left,  unit: A, dir: in }
  - { name: 1C3, side: left,  unit: A, dir: in }
  - { name: A,   side: top,   unit: A, dir: in }
  - { name: B,   side: top,   unit: A, dir: in }
  - { name: 1Y,  side: right, unit: A, dir: out }
  - { name: 2C0, side: left,  unit: B, dir: in }
  - { name: 2C1, side: left,  unit: B, dir: in }
  - { name: 2C2, side: left,  unit: B, dir: in }
  - { name: 2C3, side: left,  unit: B, dir: in }
  - { name: A,   side: top,   unit: B, dir: in }
  - { name: B,   side: top,   unit: B, dir: in }
  - { name: 2Y,  side: right, unit: B, dir: out }
