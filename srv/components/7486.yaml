# 7486 — quad 2-input EXCLUSIVE-OR gate
# Source: Nexperia, "74HC86; 74HCT86 Quad 2-input EXCLUSIVE-OR gate", product
# data sheet Rev. 7 — 2 April 2024.
# https://assets.nexperia.com/documents/data-sheet/74HC_HCT86.pdf
id: "type-7486"
type: "7486"
rendertype: subunit
numunits: 4
renderas: xor

physical: # exporter-only package metadata (FR-062e); not read by editor or sim
  package: DIP-14
  pincount: 14
  power:
    - { name: VCC, number: 14 }
    - { name: GND, number: 7 }

pins: # number: physical DIP14/SO14 pin (datasheet Table 2)
  - { name: 1A, side: left,  unit: A, dir: in,  number: 1 }
  - { name: 1B, side: left,  unit: A, dir: in,  number: 2 }
  - { name: 1Y, side: right, unit: A, dir: out, number: 3 }
  - { name: 2A, side: left,  unit: B, dir: in,  number: 4 }
  - { name: 2B, side: left,  unit: B, dir: in,  number: 5 }
  - { name: 2Y, side: right, unit: B, dir: out, number: 6 }
  - { name: 3A, side: left,  unit: C, dir: in,  number: 10 }
  - { name: 3B, side: left,  unit: C, dir: in,  number: 9 }
  - { name: 3Y, side: right, unit: C, dir: out, number: 8 }
  - { name: 4A, side: left,  unit: D, dir: in,  number: 13 }
  - { name: 4B, side: left,  unit: D, dir: in,  number: 12 }
  - { name: 4Y, side: right, unit: D, dir: out, number: 11 }

delays: # ns, 74HC86 typical at Vcc=4.5V, 25C (datasheet Table 7)
  tpd: 14 # nA/nB -> nY

behavior: |
  ; 7486 — quad 2-input EXCLUSIVE-OR gate. Derived from the function table
  ; (datasheet Table 3): each output nY is HIGH when its two inputs differ and
  ; LOW when they are equal.
  ;
  ; This is a subunit (multi-gate) package: the four gates are independent,
  ; so the behavior is one sum-of-products equation per unit, each using that
  ; unit's own pin names. (renderas: xor fixes the drawn symbol; these
  ; equations are the authoritative logic.)
  ;
  ; Equations are physical-level GALasm: '/' is the complement operator and
  ; signal names are this file's pin names with any active-low '/' prefix
  ; dropped (no input here is active-low). The XOR output is active-high and
  ; written as the two differing-input product terms: nY = nA*/nB + /nA*nB.
  1Y = 1A * /1B + /1A * 1B
  2Y = 2A * /2B + /2A * 2B
  3Y = 3A * /3B + /3A * 3B
  4Y = 4A * /4B + /4A * 4B
