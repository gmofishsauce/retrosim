# 7432 — quad 2-input OR gate
# Source: Nexperia, "74HC32; 74HCT32 Quad 2-input OR gate", product data
# sheet Rev. 10 — 30 April 2025.
# https://assets.nexperia.com/documents/data-sheet/74HC_HCT32.pdf
id: "type-7432"
type: "7432"
rendertype: subunit
numunits: 4
renderas: or

description: "Quad 2-input OR gate"
datasheet:
  vendor: Nexperia
  title: "74HC32; 74HCT32 Quad 2-input OR gate"
  rev: "Rev. 10, 30 April 2025"
  url: "https://assets.nexperia.com/documents/data-sheet/74HC_HCT32.pdf"

physical: # exporter-only package metadata (FR-062e); not read by editor or sim
  package: DIP-14
  pincount: 14
  power:
    - { name: VCC, number: 14 }
    - { name: GND, number: 7 }

pins: # number: physical DIP14/SO14 pin (datasheet Table 2)
  - { name: 1A, side: left,  unit: A, dir: in,  number: 1 }
  - { name: 1B, side: left,  unit: A, dir: in,  number: 2 }
  - { name: 1Y, side: right, unit: A, dir: out, number: 3 }
  - { name: 2A, side: left,  unit: B, dir: in,  number: 4 }
  - { name: 2B, side: left,  unit: B, dir: in,  number: 5 }
  - { name: 2Y, side: right, unit: B, dir: out, number: 6 }
  - { name: 3A, side: left,  unit: C, dir: in,  number: 9 }
  - { name: 3B, side: left,  unit: C, dir: in,  number: 10 }
  - { name: 3Y, side: right, unit: C, dir: out, number: 8 }
  - { name: 4A, side: left,  unit: D, dir: in,  number: 12 }
  - { name: 4B, side: left,  unit: D, dir: in,  number: 13 }
  - { name: 4Y, side: right, unit: D, dir: out, number: 11 }

delays: # ns, 74HC32 typical at Vcc=4.5V, 25C (datasheet Table 7)
  tpd: 8 # nA/nB -> nY

behavior: |
  ; 7432 — quad 2-input OR gate. Derived from the function table (datasheet
  ; Table 3): each output nY is HIGH when either of that gate's inputs is
  ; HIGH, and LOW only when both inputs are LOW.
  ;
  ; This is a subunit (multi-gate) package: the four gates are independent,
  ; so the behavior is one sum-of-products equation per unit, each using that
  ; unit's own pin names. (renderas: or fixes the drawn symbol; these
  ; equations are the authoritative logic.)
  ;
  ; Equations are physical-level GALasm: '/' is the complement operator and
  ; signal names are this file's pin names with any active-low '/' prefix
  ; dropped (no input here is active-low). The OR output is active-high and
  ; needs no complement: nY = nA + nB.
  1Y = 1A + 1B
  2Y = 2A + 2B
  3Y = 3A + 3B
  4Y = 4A + 4B
