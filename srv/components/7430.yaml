# 7430 — 8-input NAND gate
# Source: Nexperia, "74HC30; 74HCT30 8-input NAND gate", product data sheet
# Rev. 10 — 13 March 2024.
# https://assets.nexperia.com/documents/data-sheet/74HC_HCT30.pdf
type: "7430"
rendertype: subunit
numunits: 1
renderas: nand

description: "8-input NAND gate"
datasheet:
  vendor: Nexperia
  title: "74HC30; 74HCT30 8-input NAND gate"
  rev: "Rev. 10, 13 March 2024"
  url: "https://assets.nexperia.com/documents/data-sheet/74HC_HCT30.pdf"

pins: # number: physical DIP14/SO14 pin (datasheet Table 2)
  - { name: A, side: left,  unit: A, dir: in,  number: 1 }
  - { name: B, side: left,  unit: A, dir: in,  number: 2 }
  - { name: C, side: left,  unit: A, dir: in,  number: 3 }
  - { name: D, side: left,  unit: A, dir: in,  number: 4 }
  - { name: E, side: left,  unit: A, dir: in,  number: 5 }
  - { name: F, side: left,  unit: A, dir: in,  number: 6 }
  - { name: G, side: left,  unit: A, dir: in,  number: 11 }
  - { name: H, side: left,  unit: A, dir: in,  number: 12 }
  - { name: Y, side: right, unit: A, dir: out, number: 8 }

delays: # ns, 74HC30 typical at Vcc=4.5V, 25C (datasheet Table 7)
  tpd: 15 # A..H -> Y

behavior: |
  ; 7430 — single 8-input NAND gate. Derived from the function table
  ; (datasheet Table 3): the output Y is LOW only when all eight inputs are
  ; HIGH, and HIGH otherwise.
  ;
  ; This is a one-unit subunit package (a single gate). renderas: nand fixes
  ; the drawn symbol; the equation below is the authoritative logic.
  ;
  ; Equations are physical-level GALasm: '/' is the complement operator and
  ; signal names are this file's pin names with any active-low '/' prefix
  ; dropped (no input here is active-low). The output is active-high, so NAND
  ; is written at the output's polarity using De Morgan:
  ; Y = /A + /B + ... + /H ("Y is HIGH when any input is LOW").
  Y = /A + /B + /C + /D + /E + /F + /G + /H
