# 74138 — 3-to-8 line decoder/demultiplexer
# Source: Nexperia, "74HC138; 74HCT138 3-to-8 line decoder/demultiplexer;
# inverting", product data sheet Rev. 10 — 26 February 2024.
# https://assets.nexperia.com/documents/data-sheet/74HC_HCT138.pdf
id: "type-74138"
type: "74138"
outline: [6, 12]

description: "3-to-8 line decoder/demultiplexer, inverting"
datasheet:
  vendor: Nexperia
  title: "74HC138; 74HCT138 3-to-8 line decoder/demultiplexer; inverting"
  rev: "Rev. 10, 26 February 2024"
  url: "https://assets.nexperia.com/documents/data-sheet/74HC_HCT138.pdf"

physical: # exporter-only package metadata (FR-062e); not read by editor or sim
  package: DIP-16
  pincount: 16
  power:
    - { name: VCC, number: 16 }
    - { name: GND, number: 8 }

pins: # number: physical DIP16/SO16 pin (datasheet Table 2)
  - { name: A0,  side: left,  pos: 2, dir: in,  number: 1,  desc: "address input bit 0 (LSB)" }
  - { name: A1,  side: left,  pos: 3, dir: in,  number: 2,  desc: "address input bit 1" }
  - { name: A2,  side: left,  pos: 4, dir: in,  number: 3,  desc: "address input bit 2 (MSB)" }
  - { name: /E1, side: left,  pos: 6, dir: in,  number: 4,  desc: "active-low enable 1" }
  - { name: /E2, side: left,  pos: 7, dir: in,  number: 5,  desc: "active-low enable 2" }
  - { name: E3,  side: left,  pos: 8, dir: in,  number: 6,  desc: "active-high enable 3" }
  - { name: /Y0, side: right, pos: 2, dir: out, number: 15, desc: "active-low output 0" }
  - { name: /Y1, side: right, pos: 3, dir: out, number: 14, desc: "active-low output 1" }
  - { name: /Y2, side: right, pos: 4, dir: out, number: 13, desc: "active-low output 2" }
  - { name: /Y3, side: right, pos: 5, dir: out, number: 12, desc: "active-low output 3" }
  - { name: /Y4, side: right, pos: 6, dir: out, number: 11, desc: "active-low output 4" }
  - { name: /Y5, side: right, pos: 7, dir: out, number: 10, desc: "active-low output 5" }
  - { name: /Y6, side: right, pos: 8, dir: out, number: 9,  desc: "active-low output 6" }
  - { name: /Y7, side: right, pos: 9, dir: out, number: 7,  desc: "active-low output 7" }

groups:
  - { name: A, pins: [A0, A1, A2] }

delays: # ns, 74HC138 typical at Vcc=4.5V, 25C (datasheet Table 7)
  tpd_a: 15 # An -> Yn
  tpd_e: 17 # E1/E2/E3 -> Yn

behavior: |
  ; 74138 — 3-to-8 line decoder/demultiplexer, inverting.
  ; Derived from the function table (datasheet Table 3): every output is HIGH
  ; unless E1 and E2 are LOW and E3 is HIGH; when enabled, the one output
  ; addressed by A2..A0 (A0 = LSB) is LOW.
  ;
  ; Equations are physical-level GALasm: '/' is the complement operator and
  ; signal names are this file's pin names with any active-low '/' prefix
  ; dropped (pin /E1 is GAL signal E1, so '/E1' below means "pin /E1 is
  ; LOW"). Each output is a single AND term; '/Yn = term' drives pin Yn LOW
  ; exactly when the term is true, so the three disabled rows of the function
  ; table (all outputs HIGH) fall out of the same equations.
  /Y0 = /E1 * /E2 * E3 * /A2 * /A1 * /A0
  /Y1 = /E1 * /E2 * E3 * /A2 * /A1 *  A0
  /Y2 = /E1 * /E2 * E3 * /A2 *  A1 * /A0
  /Y3 = /E1 * /E2 * E3 * /A2 *  A1 *  A0
  /Y4 = /E1 * /E2 * E3 *  A2 * /A1 * /A0
  /Y5 = /E1 * /E2 * E3 *  A2 * /A1 *  A0
  /Y6 = /E1 * /E2 * E3 *  A2 *  A1 * /A0
  /Y7 = /E1 * /E2 * E3 *  A2 *  A1 *  A0
