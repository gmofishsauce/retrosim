# 7414 — hex inverting Schmitt trigger
# Source: Nexperia, "74HC14; 74HCT14 Hex inverting Schmitt trigger", product
# data sheet Rev. 10 — 29 February 2024.
# https://assets.nexperia.com/documents/data-sheet/74HC_HCT14.pdf
id: "type-7414"
type: "7414"
rendertype: subunit
numunits: 6
renderas: not

description: "Hex inverting Schmitt trigger"
datasheet:
  vendor: Nexperia
  title: "74HC14; 74HCT14 Hex inverting Schmitt trigger"
  rev: "Rev. 10, 29 February 2024"
  url: "https://assets.nexperia.com/documents/data-sheet/74HC_HCT14.pdf"

pins: # number: physical DIP14/SO14 pin (datasheet pinning, Fig. pinout)
  - { name: 1A, side: left,  unit: A, dir: in,  number: 1 }
  - { name: 1Y, side: right, unit: A, dir: out, number: 2 }
  - { name: 2A, side: left,  unit: B, dir: in,  number: 3 }
  - { name: 2Y, side: right, unit: B, dir: out, number: 4 }
  - { name: 3A, side: left,  unit: C, dir: in,  number: 5 }
  - { name: 3Y, side: right, unit: C, dir: out, number: 6 }
  - { name: 4A, side: left,  unit: D, dir: in,  number: 9 }
  - { name: 4Y, side: right, unit: D, dir: out, number: 8 }
  - { name: 5A, side: left,  unit: E, dir: in,  number: 11 }
  - { name: 5Y, side: right, unit: E, dir: out, number: 10 }
  - { name: 6A, side: left,  unit: F, dir: in,  number: 13 }
  - { name: 6Y, side: right, unit: F, dir: out, number: 12 }

delays: # ns, 74HC14 typical at Vcc=4.5V, 25C (datasheet Table 7)
  tpd: 15 # nA -> nY

behavior: |
  ; 7414 — hex inverting Schmitt trigger. Each gate inverts its input: a
  ; HIGH input gives a LOW output and a LOW input gives a HIGH output. The
  ; Schmitt-trigger hysteresis (datasheet Table 10) is an analog input
  ; property for noise immunity; it does not change the logic function and is
  ; not represented in this unit-delay digital model.
  ;
  ; This is a subunit (multi-gate) package: the six gates are independent,
  ; so the behavior is one equation per unit, each using that unit's own pin
  ; names. (renderas: not fixes the drawn symbol; these equations are the
  ; authoritative logic.)
  ;
  ; Equations are physical-level GALasm: '/' is the complement operator and
  ; signal names are this file's pin names with any active-low '/' prefix
  ; dropped (no pin here is active-low). Each output is the complement of
  ; its input: nY = /nA.
  1Y = /1A
  2Y = /2A
  3Y = /3A
  4Y = /4A
  5Y = /5A
  6Y = /6A
