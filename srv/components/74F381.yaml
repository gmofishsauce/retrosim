# 74F381 — 4-bit ALU / function generator (three arithmetic, three logic ops)
# Source: Fairchild Semiconductor, "74F381 4-Bit Arithmetic Logic Unit",
# DS009528 — May 1988, revised August 1999.
# https://media.digikey.com/pdf/Data%20Sheets/Fairchild%20PDFs/74F381.pdf
#
# MODELING VARIANT (per project request): the real 74F381 provides carry
# lookahead outputs /G (generate) and /P (propagate) for use with a 74F182
# carry-lookahead generator, and has NO carry-out pin. This model instead
# exposes a conventional active-high ripple carry-out `Cout` (the bit-4 carry
# of the selected arithmetic operation) so slices ripple-cascade directly
# (Cout -> Cn), and omits /G and /P. Pin 14 (the datasheet's /P) carries Cout
# here; pin 13 (the datasheet's /G) is a no-connect in this variant. Function
# set, operands, and select codes are otherwise identical to the datasheet.
id: "type-74F381"
type: "74F381"
outline: [6, 17]

description: "4-bit ALU / function generator (74F381 function set) with ripple carry-out"
datasheet:
  vendor: Fairchild Semiconductor
  title: "74F381 4-Bit Arithmetic Logic Unit"
  rev: "DS009528, May 1988 (revised August 1999)"
  url: "https://media.digikey.com/pdf/Data%20Sheets/Fairchild%20PDFs/74F381.pdf"

physical: # exporter-only package metadata (FR-062e); not read by editor or sim.
  # DIP-20 numbering follows the datasheet connection diagram; this variant puts
  # Cout where /P was (pin 14) and leaves /G's pin (13) as a no-connect.
  package: DIP-20
  pincount: 20
  power:
    - { name: VCC, number: 20 }
    - { name: GND, number: 10 }
  nc: [13] # datasheet /G output, unused in this ripple-carry variant

pins: # number: physical DIP-20 pin (datasheet Connection Diagram)
  - { name: A0,   side: left,  pos: 2,  dir: in,  number: 3,  desc: "operand A bit 0 (LSB)" }
  - { name: A1,   side: left,  pos: 3,  dir: in,  number: 1,  desc: "operand A bit 1" }
  - { name: A2,   side: left,  pos: 4,  dir: in,  number: 19, desc: "operand A bit 2" }
  - { name: A3,   side: left,  pos: 5,  dir: in,  number: 18, desc: "operand A bit 3 (MSB)" }
  - { name: B0,   side: left,  pos: 7,  dir: in,  number: 4,  desc: "operand B bit 0 (LSB)" }
  - { name: B1,   side: left,  pos: 8,  dir: in,  number: 2,  desc: "operand B bit 1" }
  - { name: B2,   side: left,  pos: 9,  dir: in,  number: 17, desc: "operand B bit 2" }
  - { name: B3,   side: left,  pos: 10, dir: in,  number: 16, desc: "operand B bit 3 (MSB)" }
  - { name: S0,   side: left,  pos: 12, dir: in,  number: 5,  desc: "function select bit 0" }
  - { name: S1,   side: left,  pos: 13, dir: in,  number: 6,  desc: "function select bit 1" }
  - { name: S2,   side: left,  pos: 14, dir: in,  number: 7,  desc: "function select bit 2" }
  - { name: Cn,   side: left,  pos: 16, dir: in,  number: 15, desc: "carry input (active high)" }
  - { name: F0,   side: right, pos: 2,  dir: out, number: 8,  desc: "function output bit 0 (LSB)" }
  - { name: F1,   side: right, pos: 4,  dir: out, number: 9,  desc: "function output bit 1" }
  - { name: F2,   side: right, pos: 6,  dir: out, number: 11, desc: "function output bit 2" }
  - { name: F3,   side: right, pos: 8,  dir: out, number: 12, desc: "function output bit 3 (MSB)" }
  - { name: Cout, side: right, pos: 12, dir: out, number: 14, desc: "ripple carry output (variant; bit-4 arithmetic carry)" }

groups:
  - { name: A, pins: [A0, A1, A2, A3] }
  - { name: B, pins: [B0, B1, B2, B3] }
  - { name: S, pins: [S0, S1, S2] }
  - { name: F, pins: [F0, F1, F2, F3] }

delays: # ns, 74F381 typical at Vcc=5V, CL=50pF, 25C (datasheet AC Electrical Characteristics)
  tpd_cn_f:    8  # Cn -> Fi          (tPLH 8.1 / tPHL 5.7)
  tpd_ab_f:    10 # An/Bn -> Fi       (tPLH 10.4 / tPHL 8.2)
  tpd_s_f:     8  # Si -> Fi          (tPLH 8.3 / tPHL 8.2)
  tpd_cn_cout: 8  # Cn -> Cout        (modeled on the Cn->F path; real 381 has no carry-out)
  tpd_ab_cout: 10 # An/Bn -> Cout     (modeled on the An/Bn->F path)

behavior: |
  ; 74F381 — 4-bit ALU, A0/B0/F0 = LSB. Combinational (no clock).
  ;
  ; Physical-level GALasm: '/' is the complement operator and a signal name is
  ; this file's pin name (all pins active-high here, so no '/' prefixes). ':+:'
  ; is the extended-dialect XOR operator (FR-079a); this part models a 74-series
  ; chip, so it declares no `gal:` and uses the extended dialect.
  ;
  ; Function select (S0 S1 S2), from the datasheet Function Select Table:
  ;   L L L  Clear   (F = 0000)
  ;   H L L  B minus A     (B + /A + Cn)
  ;   L H L  A minus B     (A + /B + Cn)
  ;   H H L  A plus B      (A + B + Cn)
  ;   L L H  A XOR B
  ;   H L H  A OR B
  ;   L H H  A AND B
  ;   H H H  Preset  (F = 1111)
  ; The two subtract modes need Cn=1 (a forced carry) to make a true 2's-complement
  ; difference, per the datasheet note.
  ;
  ; Each output bit is written  Fn = <half-sum SOP> :+: <carry-in SOP>  so the
  ; mode-selected half-sum stays a tiny sum-of-products and only the ripple carry
  ; grows (cf. 74283). The half-sum is Xn XOR Yn for add/xor, its complement for
  ; the subtracts (Xn XOR /Yn), An+Bn for OR, An*Bn for AND, 1 for preset, and 0
  ; for clear; the carry-in term is gated to the three arithmetic modes only, so
  ; it is 0 (and Fn = half-sum) in the logic/clear/preset modes. Cout is the
  ; bit-4 carry of the selected arithmetic operation and 0 in the non-arithmetic
  ; modes (this variant's ripple-carry output; the real 74F381 has /G and /P
  ; instead). Equations were machine-generated and verified against the ALU
  ; reference for all 4096 (A, B, S0..S2, Cn) input combinations.
  F0 = S0*S1*/S2*A0*/B0 + S0*S1*/S2*/A0*B0 + /S0*/S1*S2*A0*/B0 + /S0*/S1*S2*/A0*B0 + /S0*S1*/S2*A0*B0 + /S0*S1*/S2*/A0*/B0 + S0*/S1*/S2*A0*B0 + S0*/S1*/S2*/A0*/B0 + S0*/S1*S2*A0 + S0*/S1*S2*B0 + /S0*S1*S2*A0*B0 + S0*S1*S2 :+: S0*S1*/S2*Cn + /S0*S1*/S2*Cn + S0*/S1*/S2*Cn
  F1 = S0*S1*/S2*A1*/B1 + S0*S1*/S2*/A1*B1 + /S0*/S1*S2*A1*/B1 + /S0*/S1*S2*/A1*B1 + /S0*S1*/S2*A1*B1 + /S0*S1*/S2*/A1*/B1 + S0*/S1*/S2*A1*B1 + S0*/S1*/S2*/A1*/B1 + S0*/S1*S2*A1 + S0*/S1*S2*B1 + /S0*S1*S2*A1*B1 + S0*S1*S2 :+: S0*S1*/S2*A0*B0 + S0*S1*/S2*A0*Cn + S0*S1*/S2*B0*Cn + /S0*S1*/S2*A0*/B0 + /S0*S1*/S2*A0*Cn + /S0*S1*/S2*/B0*Cn + S0*/S1*/S2*B0*/A0 + S0*/S1*/S2*B0*Cn + S0*/S1*/S2*/A0*Cn
  F2 = S0*S1*/S2*A2*/B2 + S0*S1*/S2*/A2*B2 + /S0*/S1*S2*A2*/B2 + /S0*/S1*S2*/A2*B2 + /S0*S1*/S2*A2*B2 + /S0*S1*/S2*/A2*/B2 + S0*/S1*/S2*A2*B2 + S0*/S1*/S2*/A2*/B2 + S0*/S1*S2*A2 + S0*/S1*S2*B2 + /S0*S1*S2*A2*B2 + S0*S1*S2 :+: S0*S1*/S2*A1*B1 + S0*S1*/S2*A1*A0*B0 + S0*S1*/S2*B1*A0*B0 + S0*S1*/S2*A0*A1*Cn + S0*S1*/S2*A0*B1*Cn + S0*S1*/S2*B0*A1*Cn + S0*S1*/S2*B0*B1*Cn + /S0*S1*/S2*A1*/B1 + /S0*S1*/S2*A1*A0*/B0 + /S0*S1*/S2*/B1*A0*/B0 + /S0*S1*/S2*A0*A1*Cn + /S0*S1*/S2*A0*/B1*Cn + /S0*S1*/S2*/B0*A1*Cn + /S0*S1*/S2*/B0*/B1*Cn + S0*/S1*/S2*B1*/A1 + S0*/S1*/S2*B1*B0*/A0 + S0*/S1*/S2*/A1*B0*/A0 + S0*/S1*/S2*B0*B1*Cn + S0*/S1*/S2*B0*/A1*Cn + S0*/S1*/S2*/A0*B1*Cn + S0*/S1*/S2*/A0*/A1*Cn
  F3 = S0*S1*/S2*A3*/B3 + S0*S1*/S2*/A3*B3 + /S0*/S1*S2*A3*/B3 + /S0*/S1*S2*/A3*B3 + /S0*S1*/S2*A3*B3 + /S0*S1*/S2*/A3*/B3 + S0*/S1*/S2*A3*B3 + S0*/S1*/S2*/A3*/B3 + S0*/S1*S2*A3 + S0*/S1*S2*B3 + /S0*S1*S2*A3*B3 + S0*S1*S2 :+: S0*S1*/S2*A2*B2 + S0*S1*/S2*A2*A1*B1 + S0*S1*/S2*B2*A1*B1 + S0*S1*/S2*A1*A2*A0*B0 + S0*S1*/S2*A1*B2*A0*B0 + S0*S1*/S2*B1*A2*A0*B0 + S0*S1*/S2*B1*B2*A0*B0 + S0*S1*/S2*A0*A1*A2*Cn + S0*S1*/S2*A0*A1*B2*Cn + S0*S1*/S2*A0*B1*A2*Cn + S0*S1*/S2*A0*B1*B2*Cn + S0*S1*/S2*B0*A1*A2*Cn + S0*S1*/S2*B0*A1*B2*Cn + S0*S1*/S2*B0*B1*A2*Cn + S0*S1*/S2*B0*B1*B2*Cn + /S0*S1*/S2*A2*/B2 + /S0*S1*/S2*A2*A1*/B1 + /S0*S1*/S2*/B2*A1*/B1 + /S0*S1*/S2*A1*A2*A0*/B0 + /S0*S1*/S2*A1*/B2*A0*/B0 + /S0*S1*/S2*/B1*A2*A0*/B0 + /S0*S1*/S2*/B1*/B2*A0*/B0 + /S0*S1*/S2*A0*A1*A2*Cn + /S0*S1*/S2*A0*A1*/B2*Cn + /S0*S1*/S2*A0*/B1*A2*Cn + /S0*S1*/S2*A0*/B1*/B2*Cn + /S0*S1*/S2*/B0*A1*A2*Cn + /S0*S1*/S2*/B0*A1*/B2*Cn + /S0*S1*/S2*/B0*/B1*A2*Cn + /S0*S1*/S2*/B0*/B1*/B2*Cn + S0*/S1*/S2*B2*/A2 + S0*/S1*/S2*B2*B1*/A1 + S0*/S1*/S2*/A2*B1*/A1 + S0*/S1*/S2*B1*B2*B0*/A0 + S0*/S1*/S2*B1*/A2*B0*/A0 + S0*/S1*/S2*/A1*B2*B0*/A0 + S0*/S1*/S2*/A1*/A2*B0*/A0 + S0*/S1*/S2*B0*B1*B2*Cn + S0*/S1*/S2*B0*B1*/A2*Cn + S0*/S1*/S2*B0*/A1*B2*Cn + S0*/S1*/S2*B0*/A1*/A2*Cn + S0*/S1*/S2*/A0*B1*B2*Cn + S0*/S1*/S2*/A0*B1*/A2*Cn + S0*/S1*/S2*/A0*/A1*B2*Cn + S0*/S1*/S2*/A0*/A1*/A2*Cn
  Cout = S0*S1*/S2*A3*B3 + S0*S1*/S2*A3*A2*B2 + S0*S1*/S2*B3*A2*B2 + S0*S1*/S2*A2*A3*A1*B1 + S0*S1*/S2*A2*B3*A1*B1 + S0*S1*/S2*B2*A3*A1*B1 + S0*S1*/S2*B2*B3*A1*B1 + S0*S1*/S2*A1*A2*A3*A0*B0 + S0*S1*/S2*A1*A2*B3*A0*B0 + S0*S1*/S2*A1*B2*A3*A0*B0 + S0*S1*/S2*A1*B2*B3*A0*B0 + S0*S1*/S2*B1*A2*A3*A0*B0 + S0*S1*/S2*B1*A2*B3*A0*B0 + S0*S1*/S2*B1*B2*A3*A0*B0 + S0*S1*/S2*B1*B2*B3*A0*B0 + S0*S1*/S2*A0*A1*A2*A3*Cn + S0*S1*/S2*A0*A1*A2*B3*Cn + S0*S1*/S2*A0*A1*B2*A3*Cn + S0*S1*/S2*A0*A1*B2*B3*Cn + S0*S1*/S2*A0*B1*A2*A3*Cn + S0*S1*/S2*A0*B1*A2*B3*Cn + S0*S1*/S2*A0*B1*B2*A3*Cn + S0*S1*/S2*A0*B1*B2*B3*Cn + S0*S1*/S2*B0*A1*A2*A3*Cn + S0*S1*/S2*B0*A1*A2*B3*Cn + S0*S1*/S2*B0*A1*B2*A3*Cn + S0*S1*/S2*B0*A1*B2*B3*Cn + S0*S1*/S2*B0*B1*A2*A3*Cn + S0*S1*/S2*B0*B1*A2*B3*Cn + S0*S1*/S2*B0*B1*B2*A3*Cn + S0*S1*/S2*B0*B1*B2*B3*Cn + /S0*S1*/S2*A3*/B3 + /S0*S1*/S2*A3*A2*/B2 + /S0*S1*/S2*/B3*A2*/B2 + /S0*S1*/S2*A2*A3*A1*/B1 + /S0*S1*/S2*A2*/B3*A1*/B1 + /S0*S1*/S2*/B2*A3*A1*/B1 + /S0*S1*/S2*/B2*/B3*A1*/B1 + /S0*S1*/S2*A1*A2*A3*A0*/B0 + /S0*S1*/S2*A1*A2*/B3*A0*/B0 + /S0*S1*/S2*A1*/B2*A3*A0*/B0 + /S0*S1*/S2*A1*/B2*/B3*A0*/B0 + /S0*S1*/S2*/B1*A2*A3*A0*/B0 + /S0*S1*/S2*/B1*A2*/B3*A0*/B0 + /S0*S1*/S2*/B1*/B2*A3*A0*/B0 + /S0*S1*/S2*/B1*/B2*/B3*A0*/B0 + /S0*S1*/S2*A0*A1*A2*A3*Cn + /S0*S1*/S2*A0*A1*A2*/B3*Cn + /S0*S1*/S2*A0*A1*/B2*A3*Cn + /S0*S1*/S2*A0*A1*/B2*/B3*Cn + /S0*S1*/S2*A0*/B1*A2*A3*Cn + /S0*S1*/S2*A0*/B1*A2*/B3*Cn + /S0*S1*/S2*A0*/B1*/B2*A3*Cn + /S0*S1*/S2*A0*/B1*/B2*/B3*Cn + /S0*S1*/S2*/B0*A1*A2*A3*Cn + /S0*S1*/S2*/B0*A1*A2*/B3*Cn + /S0*S1*/S2*/B0*A1*/B2*A3*Cn + /S0*S1*/S2*/B0*A1*/B2*/B3*Cn + /S0*S1*/S2*/B0*/B1*A2*A3*Cn + /S0*S1*/S2*/B0*/B1*A2*/B3*Cn + /S0*S1*/S2*/B0*/B1*/B2*A3*Cn + /S0*S1*/S2*/B0*/B1*/B2*/B3*Cn + S0*/S1*/S2*B3*/A3 + S0*/S1*/S2*B3*B2*/A2 + S0*/S1*/S2*/A3*B2*/A2 + S0*/S1*/S2*B2*B3*B1*/A1 + S0*/S1*/S2*B2*/A3*B1*/A1 + S0*/S1*/S2*/A2*B3*B1*/A1 + S0*/S1*/S2*/A2*/A3*B1*/A1 + S0*/S1*/S2*B1*B2*B3*B0*/A0 + S0*/S1*/S2*B1*B2*/A3*B0*/A0 + S0*/S1*/S2*B1*/A2*B3*B0*/A0 + S0*/S1*/S2*B1*/A2*/A3*B0