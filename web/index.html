<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>retrosim</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="toolbar">
    <div id="tools"></div>
    <button id="nav-back" class="tool-btn" type="button" title="Back to parent sheet" hidden>← back</button>
    <span id="project-name">(no project)</span>
    <span id="design-name">unnamed schematic</span>
    <span id="tool-mode">select</span>
  </header>

  <main id="workspace">
    <aside id="palette" aria-label="component palette">
      <div class="palette-half">
        <div class="palette-heading">TTL Components</div>
        <div id="palette-parts" aria-label="74-series parts"></div>
      </div>
      <div class="palette-half">
        <div class="palette-heading">Built-In Components</div>
        <div id="palette-builtins" aria-label="built-in objects"></div>
      </div>
    </aside>
    <section id="canvas-area">
      <div id="canvas-host">
        <canvas id="canvas"></canvas>
      </div>
      <div id="vec-panel" hidden></div>
      <!-- Modeless Console panel (FR-122c): the magic UART's stdout surface. -->
      <div id="console-panel" hidden>
        <div class="console-header">
          <div class="console-title">Console</div>
          <button class="console-clear" type="button" title="Clear the console">Clear</button>
          <button class="console-close" type="button" title="Close the console">✕</button>
        </div>
        <div class="console-body" aria-label="console output"></div>
      </div>
    </section>
    <aside id="properties" aria-label="properties"></aside>
  </main>

  <footer id="statusbar" aria-label="status bar"></footer>

  <div id="loading-overlay">Loading component library…</div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
